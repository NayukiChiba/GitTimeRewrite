name: Release Exe

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build exe with Tauri
        run: npm --prefix frontend exec tauri build --config ../backend/tauri.conf.json --no-bundle

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitTimeRewrite-windows-exe
          path: backend/target/release/gitTimeRewrite.exe

      - name: Publish exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: backend/target/release/gitTimeRewrite.exe
